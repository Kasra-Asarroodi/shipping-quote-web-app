<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
    <title> Freight and Packaging (SCB) </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
   {% with messages = get_flashed_messages() %}
          {% if messages %}
             <div class = "popup-message">
               {{ messages [0] }}
               <button type="button" class="flash-close" onclick="this.parentElement.style.display='none'">
                ×
               </button>
             </div>
          {% endif %}
   {% endwith %}

  <header>
  
    <nav class="navbar">

    <h1 class="logo">Freight and packaging</h1>

    <ul class="nav-links">
       <li><a href="{{ url_for('home') }}">Calculation</a></li>
       <li><a href="{{ url_for('about') }}">About Us</a></li>
       <li><a href="{{ url_for('contact') }}">Contact Us</a></li>
       <li><a href="{{ url_for('enquiries') }}">Your Enquiries</a></li>
       <li><a href="{{ url_for('info') }}">Price info</a></li>
       
   </ul>

   </nav>
</header>



<title>Enquiries</title>
<div class="login-overlay">
 <form method="POST" action="{{ url_for('enquiries') }}">
     <label for="email">Find your previous enquiries by entering the email you used whilst submitting your enquiry!:</label>

     <input 
        type="email" 
        placeholder="Enter your email" 
        id="email" 
        name="email" 
        required
     >

     <button type="submit">View Enquiries</button>
 </form>
</div>



<footer class="footer-content">
    <div class="social-links">
        <a href="https://www.instagram.com/freightpackaging/" target="_blank">
            <img src="{{ url_for('static', filename='instagram.png') }}" alt="instagram-link">
        </a>

        <a href="https://www.facebook.com/p/Southern-Cross-Beam-Pty-Ltd-61577005209085/" target="_blank">
            <img src="{{ url_for('static', filename='facebook.png') }}" alt="facebook-link">
        </a>
    </div>

    <p>© 2026 SCB Pty Ltd.</p>
</footer>
</body>
</html>
